; Vanilla display test for Waveshare ESP32-C6 Touch LCD 1.47
; Uses Arduino_GFX (independent of main firmware's LovyanGFX setup).
; The point: prove the hardware works with a clean, minimal example.
;
; Build/flash:  pio run -e esp32c6_lcd_test --target upload

[env:esp32c6_lcd_test]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-c6-devkitc-1
board_build.flash_mode = dio
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbmodem2301
; Route Serial to USB-JTAG bridge (else Serial goes to UART0/GPIO16-17, nowhere).
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    moononournation/GFX Library for Arduino
